<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BellaVita Oven | Verify OTP</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

</head>

<body class="auth-body">

    <div class="bakery-bg">
        <span>🍰</span>
        <span>🧁</span>
        <span>🍩</span>
        <span>🍪</span>
        <span>🍓</span>
    </div>


    <div class="auth-card glass">
        <i class="bi bi-arrow-left back-arrow" onclick="window.location.href='/www/auth/register.html'"></i>
        <h2 class="auth-title">Verify Email</h2>
        <p class="auth-sub">Enter the OTP sent to your email</p>

        <div class="input-group">
            <input id="otp" type="text" placeholder="Enter OTP">
        </div>
        <p id="otpError" class="otp-error">
            Wrong OTP
        </p>
        <p id="resendText" class="resend-text">
            Resend OTP in <span id="timer">30</span>s
        </p>

        <button id="resendBtn" class="resend-btn" disabled>
            Resend OTP
        </button>
        <p id="verifyResendMsg" class="success-text" style="display:none;">
            New OTP sent successfully
        </p>

        <button id="verifyBtn" class="btn-primary">
            Verify OTP
        </button>
        <p id="verifySuccessMsg" class="success-text" style="display:none;">
            Email verified successfully
        </p>

    </div>

    <!-- IMPORTANT ORDER -->
    <script src="auth.js"></script>

</body>

</html>
