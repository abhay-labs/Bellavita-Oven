<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BellaVita Oven | My Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Phone Input -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.0/build/css/intlTelInput.css" />
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.0/build/js/intlTelInput.min.js"></script>

    <!-- Custom -->
    <link rel="stylesheet" href="profile.css">
</head>

<body class="alpha-bg">

    <!-- Back -->
    <button class="back-btn" onclick="history.back()">
        <i class="bi bi-arrow-left"></i>
    </button>

    <div class="profile-wrapper">

        <!-- Header -->
        <div class="profile-header text-center">
            <img src="/Bellavita_cafe/logo.png" class="alpha-logo">
            <h2>🍰 BellaVita Oven</h2>
            <p>Your Sweet Profile</p>
        </div>

        <!-- Card -->
        <div class="profile-card glass">

            <!-- Avatar -->
            <div class="avatar-section text-center">
                <label class="avatar-wrapper">
                    <img id="profilePreview" src="assets/image/default-user.png">
                    <span class="camera-icon"><i class="bi bi-camera"></i></span>
                    <input type="file" id="profilePicInput" hidden>
                </label>
                <small class="hint-text">                          </small>
            </div>

            <!-- Form -->
            <form id="profileForm">
                <div class="row g-3">

                    <div class="col-md-6">
                        <label>👤 Full Name</label>
                        <input type="text" id="name" class="form-control neon">
                    </div>

                    <div class="col-md-6">
                        <label>📧 Email (Locked)</label>
                        <input type="email" id="email" class="form-control locked" disabled>
                    </div>

                    <div class="col-md-6">
                        <label>📞 Phone</label>
                        <input type="tel" id="phone" class="form-control neon">
                        <small id="phoneHint" class="hint-text"></small>
                    </div>

                    <div class="col-md-6">
                        <label>🎂 Date of Birth</label>
                        <input type="date" id="dob" class="form-control neon">
                    </div>

                    <div class="col-md-6">
                        <label>🌍 Country</label>
                        <input type="text" id="country" class="form-control neon">
                    </div>

                    <div class="col-md-6">
                        <label>🏠 Address</label>
                        <input type="text" id="address" class="form-control neon">
                    </div>

                    <div class="col-12">
                        <label>📝 About You</label>
                        <textarea id="bio" class="form-control neon" rows="2"
                            placeholder="Tell us your favorite desserts 🍫"></textarea>
                    </div>

                </div>

                <div class="mt-4 d-flex justify-content-between">
                    <button type="button" id="editBtn" class="edit-btn">
                        <i class="bi bi-pencil"></i> Edit
                    </button>

                    <button type="submit" class="save-btn">
                        <i class="bi bi-save"></i> Save
                    </button>
                </div>
            </form>

        </div>
    </div>

    <!-- Footer -->
    <!-- Footer -->
    <footer class="profile-footer">
        <div class="footer-left">
            © <span id="year"></span> BellaVita Oven. All rights reserved.
        </div>

        <div class="footer-right">
            Developed by
            <a href="https://www.linkedin.com/in/abhayjaiswal79/" target="_blank" class="dev-name dev-link">
                Abhay Jaiswal
            </a>
        </div>

        <script>
            document.getElementById("year").textContent = new Date().getFullYear();
        </script>

        <script src="auth.js"></script>
        <script src="profile.js"></script>
        <script>requireAuth();</script>

        <!-- Toast -->
        <div id="alphaToast" class="alpha-toast">
            <i class="bi bi-check-circle-fill"></i>
            <span id="toastMsg">Saved</span>
        </div>

</body>

</html>
