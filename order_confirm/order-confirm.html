<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Order Confirmed</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="order-confirm.css">
</head>

<body>

    <div class="success-wrapper">

        <div class="success-card">

            <div class="success-icon">
                <i class="bi bi-check-lg"></i>
            </div>

            <h1>Order Confirmed 🎉</h1>
            <p>Your order has been placed successfully</p>

            <div class="order-details">
                <p>Order ID: <b id="orderId"></b></p>
                <p>Payment: <b id="paymentMethod"></b></p>
                <p>Total Amount: ₹<b id="orderAmount"></b></p>
                <p>Date: <b id="orderDate"></b></p>
            </div>

            <button onclick="goHome()">Continue Shopping</button>

        </div>

    </div>

    <script src="order-confirm.js"></script>
</body>

</html>
